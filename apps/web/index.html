<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>OpenX Agent 控制台</title>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("openx.theme");
          var resolved = pref;
          if (pref !== "light" && pref !== "dark" && pref !== "geek") {
            resolved = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme =
            resolved === "light" ? "light" : "dark";
          var accentKey =
            resolved === "light"
              ? "openx.theme.accent.light"
              : resolved === "geek"
                ? "openx.theme.accent.geek"
                : "openx.theme.accent.dark";
          var accent = localStorage.getItem(accentKey);
          if (accent) {
            document.documentElement.style.setProperty("--accent", accent);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
